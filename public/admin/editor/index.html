<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>(function(){var t=localStorage.getItem('theme');if(!t){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}document.documentElement.setAttribute('data-theme',t)})()</script>
    <title>Visual Editor | Ashley Jae Carranza</title>
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#FAFAF8" />
    <link rel="icon" href="../../assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../assets/css/blocks.css" />
    <link rel="stylesheet" href="../../assets/css/admin.css" />
    <link rel="stylesheet" href="../../assets/css/admin-editor.css" />
  </head>
  <body class="admin-shell editor-shell-body">
    <header class="admin-topbar border-bottom">
      <div class="container py-3 d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
        <div>
          <p class="section-label mb-1">Visual Editor</p>
          <h1 class="h3 mb-0">Live Section Editor</h1>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span id="editor-email" class="text-muted-ui small"></span>
          <a class="btn-outline btn-sm" href="/admin/">← Admin</a>
          <a class="btn-outline btn-sm" href="/" target="_blank" rel="noopener noreferrer">View Live</a>
          <button id="editor-logout" class="btn-outline btn-sm" type="button">Log Out</button>
        </div>
      </div>
    </header>

    <main class="editor-shell container-fluid">
      <div id="editor-banner" class="alert d-none" role="alert"></div>
      <aside class="editor-palette" id="editor-palette"></aside>
      <section class="editor-pane" id="editor-pane">
        <div class="editor-loading">Loading editor…</div>
      </section>
    </main>

    <script type="module" src="../../assets/js/admin-editor.js"></script>
  </body>
</html>
